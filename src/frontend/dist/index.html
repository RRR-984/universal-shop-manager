  <body>
    <div id="root"></div>
    <!--
      Capture beforeinstallprompt BEFORE React mounts.
      The browser fires this event early during page parse — if we wait for
      React to mount a component, the event is already gone.
      We store it on window so InstallPromptPopup can read it on mount.
    -->
    <script>
      window.deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredInstallPrompt = e;
      }, { once: true });
    </script>
